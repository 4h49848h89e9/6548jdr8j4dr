name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Download dependencies
      run: |
        go mod download
        go get github.com/webview/webview@v0.0.0-20231011074434-fafb2d1874b2
    
    - name: Build EXE
      run: |
        go build -ldflags="-H windowsgui" -o GoDesktopApp.exe main.go
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoDesktopApp-Windows
        path: GoDesktopApp.exe
    
    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: GoDesktopApp.exe
        asset_name: GoDesktopApp.exe
        asset_content_type: application/octet-stream
