name: Build Go Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        go mod download
        go get github.com/webview/webview
    
    - name: Build for Windows
      run: |
        go build -ldflags="-H windowsgui" -o GoDesktopApp.exe main.go
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoDesktopApp-Windows
        path: GoDesktopApp.exe
    
    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: GoDesktopApp.exe
        asset_name: GoDesktopApp-Windows.exe
        asset_content_type: application/octet-stream

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
        go mod download
    
    - name: Build for Linux
      run: |
        go build -o GoDesktopApp main.go
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoDesktopApp-Linux
        path: GoDesktopApp

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        go mod download
    
    - name: Build for macOS
      run: |
        go build -o GoDesktopApp main.go
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoDesktopApp-macOS
        path: GoDesktopApp
