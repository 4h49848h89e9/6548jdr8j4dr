name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Install Go FIRST so it gets added to the Windows PATH
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    # 2. Install MSYS2 SECOND so it inherits the PATH containing Go
    - name: Install MSYS2 & GCC
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc
        path-type: inherit

    - name: Download dependencies
      shell: msys2 {0}
      run: |
        go mod tidy
        go mod download

    - name: Build EXE
      shell: msys2 {0}
      env:
        CGO_ENABLED: 1
      run: |
        go build -ldflags="-H windowsgui" -o GoDesktopApp.exe main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoDesktopApp-Windows
        path: GoDesktopApp.exe

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: GoDesktopApp.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
